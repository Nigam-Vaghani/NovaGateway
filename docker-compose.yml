version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novagateway_backend
    ports:
      - "8000:8000"
      - "80:80"
      - "443:443"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/novagateway
      - REDIS_URL=redis://redis:6379/0
      - SSL_CERTFILE=/app/certs/cert.pem
      - SSL_KEYFILE=/app/certs/key.pem
      - HTTP_REDIRECT_PORT=80
      - HTTPS_PORT=443
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./certs:/app/certs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novagateway_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: novagateway_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: novagateway
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: novagateway_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
